<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Регистрация</title>
    <style>
        body { font-family: Arial, sans-serif; }
        form { max-width: 400px; margin: 20px auto; }
        input, button, select { margin: 5px 0; display: block; width: 100%; padding: 8px; }
        .error { color: red; }
        .success { color: green; }
    </style>
</head>
<body>
    <h1>Регистрация</h1>
    <form id="regForm">
        <input type="text" name="login" placeholder="Логин" required>
        <input type="email" name="email" placeholder="Email" required>
        <input type="password" name="password" placeholder="Пароль" required>
        <input type="password" name="password2" placeholder="Повторите пароль" required>
        <input type="text" name="Name" placeholder="Имя">
        <input type="text" name="Lastname" placeholder="Фамилия">
        <input type="number" name="age" placeholder="Возраст">
        
        <select name="gender">
            <option value="">Пол (не выбран)</option>
            <option value="male">Мужской</option>
            <option value="female">Женский</option>
            <option value="other">Другое</option>
        </select>

        <input type="text" name="blod_type" placeholder="Группа крови">
        <input type="text" name="profession" placeholder="Профессия">
        <input type="text" name="having_children" placeholder="Дети (например: нет/2)">
        <input type="text" name="marital_status" placeholder="Семейное положение">
        <input type="text" name="hobby" placeholder="Хобби">
        <input type="text" name="education" placeholder="Образование">

        <button type="submit">Зарегистрироваться</button>
    </form>

    <div id="message"></div>

    <script>
        const form = document.getElementById('regForm');
        const message = document.getElementById('message');

        form.addEventListener('submit', function(e) {
            e.preventDefault();

            const formData = new FormData(form);

            fetch('https://qucu.ru/PHP/registration.php', {
                method: 'POST',
                body: formData
            })
            .then(response => response.text())
            .then(data => {
                message.innerHTML = data;
                if (data.includes("успешна")) {
                    message.className = 'success';
                    form.reset();
                } else {
                    message.className = 'error';
                }
            })
            .catch(error => {
                message.className = 'error';
                message.innerHTML = 'Ошибка: ' + error;
            });
        });
    </script>
</body>
</html>
