<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Форма обратной связи</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="shortcut icon" href="https://new.qucu.ru/nodejs.svg" type="image/x-icon">
  <style>
    body {
      font-family: sans-serif;
      margin: 20px;
    }
    main{
      display:flex;
      justify-content: center;
      align-items: center;
      width:100%;
      min-height:100hv;
      flex-direction: column;
    }
    input, textarea, button {
      display: block;
      margin: 10px 0;
      width: 300px;
      padding: 8px;
      box-sizing: border-box;
    }
    textarea {
      min-height: 100px;
    }
    button {
      width: 150px;
      cursor: pointer;
      background: green;
      color: white;
      border: none;
    }
    .status {
      margin-top: 15px;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <main>

      <h2>Форма обратной связи</h2>

      <form id="quoteForm">
        <input type="text" name="fullName" placeholder="Ваше имя" required>
        <input type="email" name="email" placeholder="Email" required>
        <input type="tel" name="phone" placeholder="Телефон">
        <textarea name="goals" placeholder="Сообщение"></textarea>

        <button type="submit">Отправить</button>
      </form>

      <div id="status" class="status"></div>

  </main>
<script>
  const form = document.getElementById('quoteForm');
  const status = document.getElementById('status');

  form.addEventListener('submit', async (e) => {
    e.preventDefault();

    status.textContent = 'Отправка...';

    const formData = new FormData(form);

    const data = {
      fullName: formData.get('fullName'),
      email: formData.get('email'),
      phone: formData.get('phone'),
      goals: formData.get('goals'),
      page: window.location.href
    };

    try {
      const response = await fetch('https://new.qucu.ru/send-quote', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json'
        },
        body: JSON.stringify(data)
      });

      const result = await response.json();

      if (result.success) {
        status.textContent = '✅ Заявка успешно отправлена';
        form.reset();
      } else {
        status.textContent = '❌ Ошибка: ' + result.message;
      }
    } catch (err) {
      console.error(err);
      status.textContent = '❌ Ошибка соединения с сервером';
    }
  });
</script>

</body>
</html>
